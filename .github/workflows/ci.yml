name: Compose CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compose-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create env file
        run: cp .env.example .env

      - name: Validate Compose file
        run: docker compose config

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Wait and test web endpoint
        run: |
          for i in {1..20}; do
            if curl -fsS http://localhost:5050 | grep -q "Visit count"; then
              echo "Web app is OK"
              exit 0
            fi
            echo "Waiting for web app..."
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Show container status
        if: always()
        run: docker compose ps

      - name: Cleanup
        if: always()
        run: docker compose down -v
